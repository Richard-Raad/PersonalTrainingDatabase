<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Change Password — Personal Training Database</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <span class="nav-brand">Personal Training Database</span>
    <div class="nav-links">
        <span class="nav-user">{{ current_user.username }} ({{ current_user.role }})</span>
        <a href="/">Dashboard</a>
        {% if current_user.role == 'admin' %}
        <a href="/admin/create-user">Create User</a>
        {% endif %}
        <a href="/logout" class="nav-logout">Log Out</a>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-box">
        <h2>Change Password</h2>

        {% if error %}
        <div class="message error">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="message success">{{ success }}</div>
        {% endif %}

        <form method="post" action="/change-password">
            <label>
                Current Password<br>
                <input type="password" name="current_password" required autocomplete="current-password">
            </label>
            <label>
                New Password<br>
                <input type="password" name="new_password" required
                       autocomplete="new-password" minlength="6">
            </label>
            <label>
                Confirm New Password<br>
                <input type="password" name="confirm_password" required
                       autocomplete="new-password" minlength="6">
            </label>
            <button type="submit">Change Password</button>
        </form>
    </div>
</div>

</body>
</html>
